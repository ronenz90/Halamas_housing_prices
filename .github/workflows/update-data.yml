name: Update Housing Index Data

on:
  schedule:
    - cron: '0 16 15 * *'
    - cron: '0 6 16 * *'
    - cron: '0 10 1 2,5,8,11 *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xlsx
        run: npm install xlsx --prefix /tmp/xlsxpkg

      - name: Fetch CBS Data
        run: node src/fetch-data.js
        env:
          NODE_ENV: production

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update housing data - $(date +'%Y-%m-%d')"
          git push
