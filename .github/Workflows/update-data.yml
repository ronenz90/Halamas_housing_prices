name: Update Housing Index Data

on:
  schedule:
    # Run on the 15th of every month at 19:00 Israel time (UTC+3 → 16:00 UTC)
    - cron: '0 16 15 * *'
    # Also run on the 16th as backup (in case of holidays/delays)
    - cron: '0 6 16 * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CBS Data
        run: node src/fetch-data.js
        env:
          NODE_ENV: production

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update housing index data - $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,src,node_modules'
