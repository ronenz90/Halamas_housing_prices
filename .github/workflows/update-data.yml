name: Update Housing Index Data

on:
  schedule:
    # 15th of month at 19:00 Israel time (16:00 UTC)
    - cron: '0 16 15 * *'
    # 16th backup
    - cron: '0 6 16 * *'
    # 1st of each quarter for locality price update (Feb, May, Aug, Nov)
    - cron: '0 10 1 2,5,8,11 *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx --prefix /tmp/xlsxpkg

      - name: Fetch CBS Data
        run: node src/fetch-data.js
        env:
          NODE_ENV: production

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update housing data - $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,src,node_modules'
